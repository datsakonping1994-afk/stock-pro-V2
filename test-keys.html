<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>API Key Tester</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060c;color:#f0f4fc;font-family:'Inter',sans-serif;padding:20px}
h2{color:#c9a84c;margin-bottom:16px;font-size:16px;letter-spacing:2px}
.row{background:#0e1420;border:1px solid #1a2638;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.name{font-size:13px;font-weight:600;color:#a8b8d0}
.status{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.status.testing{background:rgba(201,168,76,0.15);color:#c9a84c}
.status.ok{background:rgba(0,230,118,0.15);color:#00e676}
.status.fail{background:rgba(255,77,106,0.15);color:#ff4d6a}
.detail{font-size:10px;color:#6b7fa0;margin-top:4px}
</style>
</head>
<body>
<h2>🔑 API KEY TEST</h2>
<div id="results"></div>
<script>
const FINNHUB_KEY='d83vsjpr01qkm5c9o0p0d83vsjpr01qkm5c9o0pg';
const POLYGON_KEY='H4aNSuAK_NrGDRn5RMyoxySpfMq5R1SY';
const TWELVE_KEY='b0e5127de9f24870a3a875d64add7688';
const GNEWS_KEY='04e902741e046e76b09896b84f17b83b';
const MARKETAUX_KEY='6NR1RtHOSzR5Bx4DiyznD2uGc0EuhVoVGYSo7qFN';

const tests=[
  {
    name:'Finnhub — Quote',
    url:`https://finnhub.io/api/v1/quote?symbol=AAPL&token=${FINNHUB_KEY}`,
    check:d=>d?.c>0,
    detail:d=>`AAPL price: $${d?.c}`
  },
  {
    name:'Finnhub — Candle (paid only)',
    url:`https://finnhub.io/api/v1/stock/candle?symbol=AAPL&resolution=D&from=${Math.floor(Date.now()/1000)-30*86400}&to=${Math.floor(Date.now()/1000)}&token=${FINNHUB_KEY}`,
    check:d=>d?.s==='ok'&&d?.c?.length>0,
    detail:d=>`bars: ${d?.c?.length||0}, status: ${d?.s}`
  },
  {
    name:'Polygon — Historical Candle',
    url:`https://api.polygon.io/v2/aggs/ticker/AAPL/range/1/day/2025-04-01/2025-05-21?adjusted=true&sort=asc&limit=30&apiKey=${POLYGON_KEY}`,
    check:d=>d?.results?.length>0,
    detail:d=>`bars: ${d?.results?.length||0}, status: ${d?.status}`
  },
  {
    name:'Twelve Data — Candle',
    url:`https://api.twelvedata.com/time_series?symbol=AAPL&interval=1day&outputsize=30&apikey=${TWELVE_KEY}`,
    check:d=>d?.values?.length>0,
    detail:d=>`bars: ${d?.values?.length||0}${d?.message?' | '+d.message:''}`
  },
  {
    name:'GNews — Headlines',
    url:`https://gnews.io/api/v4/top-headlines?category=business&lang=en&max=1&apikey=${GNEWS_KEY}`,
    check:d=>d?.articles?.length>0,
    detail:d=>`articles: ${d?.articles?.length||0}${d?.errors?' | '+JSON.stringify(d.errors):''}`
  },
  {
    name:'Marketaux — News',
    url:`https://api.marketaux.com/v1/news/all?language=en&filter_entities=true&limit=1&api_token=${MARKETAUX_KEY}`,
    check:d=>d?.data?.length>0,
    detail:d=>`articles: ${d?.data?.length||0}`
  },
];

async function runTest(test){
  const row=document.createElement('div');
  row.className='row';
  row.innerHTML=`<div><div class="name">${test.name}</div><div class="detail" id="d-${test.name}">กำลังทดสอบ...</div></div><span class="status testing" id="s-${test.name}">⏳</span>`;
  document.getElementById('results').appendChild(row);
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(test.url,{signal:ctrl.signal});
    clearTimeout(tid);
    const d=await r.json();
    const ok=test.check(d);
    document.getElementById('s-'+test.name).className='status '+(ok?'ok':'fail');
    document.getElementById('s-'+test.name).textContent=ok?'✅ OK':'❌ FAIL';
    document.getElementById('d-'+test.name).textContent=test.detail(d);
  }catch(e){
    document.getElementById('s-'+test.name).className='status fail';
    document.getElementById('s-'+test.name).textContent='❌ ERROR';
    document.getElementById('d-'+test.name).textContent=e.message;
  }
}

tests.forEach(t=>runTest(t));
</script>
</body>
</html>
